<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Example</title>
</head>
<body>
    <div id="app"></div>
    <script src="../dist/library.min.js"></script>
    <script>
        const wrapperDiv = new SimpleHtmlElement();
        wrapperDiv.setAttribute('id', 'wrapper');
        wrapperDiv.addStyle('color', 'blue');
        wrapperDiv.setContent('Hello, World!');
        wrapperDiv.attach("#app");

        class MyWrapper extends ComponentWrapper {
            constructor() {
                super();
                this.element.addClass('my-wrapper');
            }

            prebuild()
            {
                this.element.setContent('This is a wrapper component and the content will change in 5 seconds.');
                setTimeout(() => {
                    this.element.setContent('The content has been changed!');
                    this.element.addChild().setType('p').setContent(' (This is a child element)').addStyle('color', 'red');
                }, 5000);
            }
        }

        // wrapperDiv.addElement(new MyWrapper().build());
        const myComponent = new MyWrapper().build();
        wrapperDiv.addElement(myComponent);

    </script>
</body>
</html>
